name: Update Contributors
on:
  push:
    branches: [main, master] # Mendukung main dan master sekaligus

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # IZIN KRUSIAL: Agar bot bisa commit balik ke repo
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Ambil semua history agar kontributor terdeteksi

      - name: Create CONTRIBUTORS.md if not exists
        run: |
          if [ ! -f CONTRIBUTORS.md ]; then
            cat > CONTRIBUTORS.md << 'EOF'
          # Contributors
          
          Makasih buat semua yang udah berkontribusi ke project ini! 🎉
          
          <!-- readme: contributors -start -->
          <!-- readme: contributors -end -->
          EOF
          fi

      - uses: akhilmhdh/contributors-readme-action@v2.3.6
        with:
          readme: CONTRIBUTORS.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
