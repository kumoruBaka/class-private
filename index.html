<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Belajar Hiragana & Katakana dalam 7 hari — kurikulum terstruktur dengan latihan menulis, kuis membaca, dan kosakata harian.">
  <title>かな学習 — Belajar Hiragana & Katakana 7 Hari</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen" class="loading-screen">
    <div class="loading-content">
      <div class="loading-kanji">かな</div>
      <div class="loading-bar-track">
        <div class="loading-bar-fill"></div>
      </div>
      <p class="loading-text">Memuat kurikulum...</p>
    </div>
  </div>

  <!-- Main App -->
  <div id="app" class="app hidden">
    <!-- Sidebar Navigation -->
    <nav id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-jp">かな</span>
          <span class="logo-text">学習</span>
        </div>
        <p class="sidebar-subtitle">7 Hari Belajar</p>
      </div>

      <div class="progress-ring-container">
        <svg class="progress-ring" viewBox="0 0 120 120">
          <circle class="progress-ring-bg" cx="60" cy="60" r="52" />
          <circle id="progress-ring-fill" class="progress-ring-fill" cx="60" cy="60" r="52" />
        </svg>
        <div class="progress-ring-label">
          <span id="progress-percent">0</span>%
        </div>
      </div>

      <ul id="day-nav" class="day-nav">
        <!-- Generated by JS -->
      </ul>

      <div class="sidebar-footer">
        <button id="btn-reset" class="btn-reset" title="Reset semua progress">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 1 9 9"/><polyline points="3 3 3 12 12 12"/></svg>
          Reset Progress
        </button>
      </div>
    </nav>

    <!-- Mobile Header -->
    <header id="mobile-header" class="mobile-header">
      <button id="btn-menu" class="btn-menu" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
      <div class="logo">
        <span class="logo-jp">かな</span>
        <span class="logo-text">学習</span>
      </div>
      <div class="mobile-progress">
        <span id="mobile-progress-text">0%</span>
      </div>
    </header>

    <!-- Main Content Area -->
    <main id="main-content" class="main-content">
      <!-- Hero / Landing -->
      <section id="view-landing" class="view view-landing active">
        <div class="hero">
          <div class="hero-particles" id="hero-particles"></div>
          <div class="hero-content">
            <h1 class="hero-title">
              <span class="hero-jp">ひらがな & カタカナ</span>
              <span class="hero-sub">Kuasai dalam 7 Hari</span>
            </h1>
            <p class="hero-desc">
              Kurikulum terstruktur untuk menghafal seluruh huruf Hiragana dan Katakana — 
              lengkap dengan latihan menulis, kuis membaca, dan kosakata harian.
            </p>
            <div class="hero-stats">
              <div class="stat-card">
                <span class="stat-number">46</span>
                <span class="stat-label">Hiragana</span>
              </div>
              <div class="stat-card">
                <span class="stat-number">46</span>
                <span class="stat-label">Katakana</span>
              </div>
              <div class="stat-card">
                <span class="stat-number">7</span>
                <span class="stat-label">Hari</span>
              </div>
              <div class="stat-card">
                <span class="stat-number">100+</span>
                <span class="stat-label">Kosakata</span>
              </div>
            </div>
            <button id="btn-start" class="btn-primary btn-glow">
              <span>Mulai Belajar</span>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>
          </div>
        </div>
      </section>

      <!-- Day View Template (rendered by JS) -->
      <section id="view-day" class="view view-day"></section>

      <!-- Quiz View -->
      <section id="view-quiz" class="view view-quiz"></section>

      <!-- Writing Practice View -->
      <section id="view-writing" class="view view-writing"></section>
    </main>
  </div>

  <!-- Overlay for mobile sidebar -->
  <div id="sidebar-overlay" class="sidebar-overlay"></div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
